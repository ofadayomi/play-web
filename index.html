<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomber Jet Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Bomber Jet Game</h1>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="controls">
            <p>Use arrow keys to move, space to drop bomb.</p>
        </div>
        <div id="score-panel">
            <h2>Current Score: <span id="current-score">0</span></h2>
            <h2>Stage: <span id="current-stage">1</span></h2>
        </div>
        <div id="high-score-panel">
            <h2>Highest Score of the Week</h2>
            <p id="high-score-display">No high score yet</p>
        </div>
        <button id="start-btn">Lets play</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
